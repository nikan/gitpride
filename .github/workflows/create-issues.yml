name: Create GitHub Issues from Plan

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm issue creation (this creates ~25 issues)"
        required: true
        default: ""

jobs:
  create-issues:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up gh CLI
        run: gh auth status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Epic label and all issues
        run: bash scripts/create-issues.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
